name: Build Pocket Pal exe

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore PocketPal.sln

      - name: Publish PocketPal
        run: dotnet publish PocketPal/PocketPal.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o publish
  
      - name: Publish self-contained single-file exe
        run: >
          dotnet publish PocketPal/PocketPal.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketPal-win-x64
          path: publish/PocketPal.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/PocketPal.exe
